name: Update Personal Time Calendar

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install icalendar recurring_ical_events requests pytz

      - name: Generate personal_time.ics
        env:
          PUSH_ICS_URL: ${{ secrets.PUSH_ICS_URL }}
          WEEKLY_HOURS_TARGET: "6"
          WAKE_START: "11:00"
          WAKE_END: "23:59"
          MIN_BLOCK_MINUTES: "15"
          MAX_BLOCK_MINUTES: "120"
          LOOKAHEAD_DAYS: "9"
          TIMEZONE: "America/New_York"
          EVENT_TITLE: "Comptia Study"
        run: python schedule_freetime.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add personal_time.ics
          git diff --quiet --cached || git commit -m "Update personal_time.ics"
          git push
